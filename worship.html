    <!-- Page Content -->
    <section class="section">
      <div class="inner">
        <h1 class="page__title">예배 안내</h1>
        <div class="page__divider"></div>

        <div class="space-y-6">
          <!-- Worship Service -->
          <div class="card">
            <h2 class="card__title">주일 예배</h2>
            <p class="text-body mb-1"><strong>시간:</strong> 매주 일요일 오전 10:00</p>
            <p class="text-body mb-1"><strong>장소:</strong> 본당</p>
            <p class="text-body"><strong>순서:</strong> 찬송 - 기도 - 설교 - 헌금 - 축도</p>
          </div>

          <!-- Wednesday Prayer -->
          <div class="card">
            <h2 class="card__title">수요일 저녁 기도회</h2>
            <p class="text-body mb-1"><strong>시간:</strong> 매주 수요일 오후 7:00</p>
            <p class="text-body"><strong>장소:</strong> 중보기도실</p>
          </div>

          <!-- Early Morning Prayer -->
          <div class="card">
            <h2 class="card__title">새벽 기도회</h2>
            <p class="text-body mb-1"><strong>시간:</strong> 매일 오전 5:30</p>
            <p class="text-body"><strong>장소:</strong> 기도실</p>
          </div>

          <!-- Notes -->
          <div class="card--highlight">
            <h2 class="card__title">주의사항</h2>
            <ul class="list-disc list-inside text-body space-y-1">
              <li>코로나19 방역 수칙을 준수해주시기 바랍니다.</li>
              <li>마스크 착용이 권장됩니다.</li>
              <li>손 소독제를 비치하고 있습니다.</li>
            </ul>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
